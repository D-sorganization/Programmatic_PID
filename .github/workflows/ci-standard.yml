name: CI Standard

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Create isolated Python environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Install dev dependencies
        run: pip install --force-reinstall --ignore-installed -r dev-requirements.txt

      - name: Check tool version consistency
        run: python scripts/check_ci_policy.py tool-versions

      - name: Lint
        run: ruff check src/ tests/

      - name: Check formatting
        run: black --check src/ tests/

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Type check
        run: mypy src/ tests/ --ignore-missing-imports --show-error-codes
        continue-on-error: true

      - name: Security scan
        run: bandit -r src/ tests/ -ll -ii

      - name: Verify no placeholders
        run: python scripts/check_ci_policy.py no-placeholders

  security-scan:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Create isolated Python environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Install dev dependencies
        run: pip install --force-reinstall --ignore-installed -r dev-requirements.txt

      - name: Audit python dependencies
        run: pip-audit -r requirements.txt --progress-spinner=off

  tests:
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Create isolated Python environment
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --force-reinstall --ignore-installed -r dev-requirements.txt
          pip install -e .

      - name: Run tests
        run: python -m pytest -p no:xvfb tests/ -v --cov=programmatic_pid --cov-report=xml --cov-report=term-missing

      - uses: codecov/codecov-action@v5
        if: ${{ env.CODECOV_TOKEN != '' }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: false
